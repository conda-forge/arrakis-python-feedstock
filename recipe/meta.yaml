{% set name = "arrakis-python" %}
{% set pypi_name = "arrakis" %}
{% set version = "0.7.0" %}

{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ pypi_name[0] }}/{{ pypi_name }}/arrakis-{{ version }}.tar.gz
  sha256: eaead412f7176c5abac25b493b2b6213076003eba6b9a5c0d709c210a5f6876b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
  run:
    - gpstime
    - jsonschema
    - libarrow-flight
    - numpy
    - pyarrow
    - python >={{ python_min }}
    - python-arrakis-schema =0.2.*
    - python-confluent-kafka >=1.8
    - sympy
    - typing_extensions

test:
  requires:
    - pip
    - python {{ python_min }}
    - pytest
    - pytest-console-scripts
    - pytest-freezer
    - mockafka-py
  commands:
    - python -m pip check
    - python -m pip show {{ pypi_name }}
    - python -m pytest -ra -v --pyargs arrakis

about:
  home: https://git.ligo.org/ngdd/arrakis-python
  dev_url: https://git.ligo.org/ngdd/arrakis-python
  doc_url: https://docs.ligo.org/ngdd/arrakis-python
  summary: Arrakis Python client library
  license: LGPL-3.0-or-later
  license_file: LICENSE
  description: |
    ## Features

    - Query live and historical timeseries data
    - Describe channel metadata
    - Search for channels matching a set of conditions
    - Publish timeseries data

extra:
  recipe-maintainers:
    - nothisisolivia
    - duncanmmacleod
    - jrollins
    - myNameIsPatrick
